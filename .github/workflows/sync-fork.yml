name: Sync Fork with Upstream

on:
  schedule:
    # Runs every minute (minimum interval for GitHub Actions cron)
    # Note: GitHub Actions doesn't support intervals less than 1 minute
    - cron: '*/1 * * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to the repository
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for proper merging
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          # Replace UPSTREAM_REPO with your upstream repository URL
          # Format: https://github.com/OWNER/REPO.git
          UPSTREAM_REPO="${UPSTREAM_REPO:-}"
          if [ -z "$UPSTREAM_REPO" ]; then
            echo "Error: UPSTREAM_REPO secret is not set"
            echo "Please set it in your repository secrets: Settings > Secrets and variables > Actions"
            exit 1
          fi
          
          # Check if upstream remote already exists
          if git remote | grep -q "^upstream$"; then
            git remote set-url upstream "$UPSTREAM_REPO"
          else
            git remote add upstream "$UPSTREAM_REPO"
          fi
        env:
          UPSTREAM_REPO: ${{ secrets.UPSTREAM_REPO }}

      - name: Fetch upstream
        run: git fetch upstream

      - name: Get current branch
        id: branch
        run: echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT

      - name: Merge upstream changes
        run: |
          git checkout ${{ steps.branch.outputs.branch }}
          git merge upstream/${{ steps.branch.outputs.branch }} --no-edit || {
            echo "No changes to merge or merge conflict occurred"
            exit 0
          }

      - name: Push changes
        run: |
          git push origin ${{ steps.branch.outputs.branch }} || {
            echo "No changes to push"
            exit 0
          }
